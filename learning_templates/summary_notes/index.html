<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[科目名] まとめノート</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- marked.js: Markdown → HTML -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════════════
     HEADER
══════════════════════════════════════ -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-left">
      <span class="header-title">[科目名] — まとめノート</span>
      <span class="header-sub" id="headerSub"></span>
    </div>
    <div class="header-right">
      <button class="tab-btn active" id="tabSummary" onclick="switchTab('summary')">まとめ</button>
      <button class="tab-btn"        id="tabQuiz"    onclick="switchTab('quiz')">穴埋め</button>
    </div>
  </div>
</header>

<!-- ══════════════════════════════════════
     UNIT NAV SIDEBAR (fixed)
══════════════════════════════════════ -->
<nav class="unit-nav" id="unitNav">
  <!-- generated by app.js -->
</nav>

<!-- ══════════════════════════════════════
     MAIN CONTENT
══════════════════════════════════════ -->
<main class="main" id="main">

  <!-- Loading state -->
  <div class="loading-state" id="loadingState">
    <div class="loading-spinner"></div>
    <p>読み込み中…</p>
  </div>

  <!-- Error state -->
  <div class="error-state" id="errorState" style="display:none">
    <p class="error-icon">⚠</p>
    <p id="errorMsg">ファイルを読み込めませんでした</p>
    <button class="btn-ghost" onclick="reloadUnit()">再試行</button>
  </div>

  <!-- Summary tab -->
  <div class="tab-panel" id="panelSummary" style="display:none">
    <div class="unit-header">
      <span class="unit-num" id="unitNum"></span>
      <div>
        <h1 class="unit-title" id="unitTitle"></h1>
        <p class="unit-progress" id="unitProgress"></p>
      </div>
    </div>
    <div class="markdown-body" id="markdownBody"></div>
  </div>

  <!-- Quiz tab -->
  <div class="tab-panel" id="panelQuiz" style="display:none">
    <div class="unit-header">
      <span class="unit-num" id="unitNumQ"></span>
      <div>
        <h1 class="unit-title" id="unitTitleQ"></h1>
      </div>
    </div>
    <div class="quiz-progress-bar">
      <div class="quiz-progress-fill" id="quizProgressFill"></div>
    </div>
    <div class="quiz-wrap" id="quizWrap"></div>
    <div class="quiz-controls">
      <button class="btn-primary"  onclick="checkQuiz()">答え合わせ</button>
      <button class="btn-ghost"    onclick="retryWrong()">✗ のみ再挑戦</button>
      <button class="btn-ghost"    onclick="resetQuiz()">リセット</button>
      <span class="quiz-score" id="quizScore"></span>
    </div>
  </div>

</main>

<!-- ══════════════════════════════════════
     MOBILE: OVERLAY + HAMBURGER
══════════════════════════════════════ -->
<div class="nav-overlay" id="navOverlay"></div>
<button class="nav-toggle" id="navToggle" aria-label="ナビを開く">
  <span class="nav-toggle-icon">☰</span>
  <span>Units</span>
</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
