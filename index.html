<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Tools — Shoei451</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/top-style.css">
</head>
<body>

<!-- ══════════════════════════════════════
     NAVBAR
══════════════════════════════════════ -->
<nav class="navbar">
  <div class="navbar__inner">
    <a href="/" class="navbar__logo">
      <span class="navbar__logo-mark">451</span>
      Study Tools
    </a>
    <div class="navbar__right">
      <ul class="navbar__section-links">
        <li><a href="#flashcards">フラッシュカード</a></li>
        <li><a href="#notes">まとめノート</a></li>
      </ul>
      <span class="navbar__count" id="totalCount"></span>
    </div>
  </div>
</nav>

<!-- ══════════════════════════════════════
     HERO
══════════════════════════════════════ -->
<div class="hero">
  <div>
    <p class="hero__eyebrow">Shoei451 · Study Tools</p>
    <h1 class="hero__title">学習ツール一覧</h1>
    <p class="hero__sub">フラッシュカードとまとめノートをまとめて管理</p>
  </div>
  <div class="hero__stats">
    <div class="hero__stat">
      <strong id="heroFlashCount">—</strong>
      flashcard sets
    </div>
    <div class="hero__stat">
      <strong id="heroNotesCount">—</strong>
      note sets
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     FLASHCARDS
══════════════════════════════════════ -->
<section class="section" id="flashcards">
  <div class="section-header">
    <div class="section-header__left">
      <h2 class="section-title">
        フラッシュカード
        <span class="section-title__en">Flashcards</span>
      </h2>
      <span class="section-count" id="fcCount"></span>
    </div>
  </div>
  <div class="card-grid" id="fcGrid"></div>
</section>

<hr class="divider">

<!-- ══════════════════════════════════════
     NOTES
══════════════════════════════════════ -->
<section class="section" id="notes">
  <div class="section-header">
    <div class="section-header__left">
      <h2 class="section-title">
        まとめノート
        <span class="section-title__en">Summary Notes</span>
      </h2>
      <span class="section-count" id="notesCount"></span>
    </div>
  </div>
  <div class="card-grid" id="notesGrid"></div>
</section>

<!-- ══════════════════════════════════════
     FOOTER
══════════════════════════════════════ -->
<footer>
  <p class="footer__left">© 2026 Shoei Okamoto · 451</p>
  <ul class="footer__links">
    <li><a href="https://451-docs.netlify.app" target="_blank">Blog</a></li>
    <li><a href="https://shoei451.app" target="_blank">My Site</a></li>
  </ul>
</footer>

<!-- ── data ── -->
<script src="flashcards-list.js"></script>
<script src="notes-list.js"></script>

<script>
// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════

// color-mix() の fallback 用にカラーを薄めるユーティリティ
function hexToAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// 日付フォーマット YYYY-MM-DD → M/D
function fmtDate(str) {
  if (!str) return '';
  const [, m, d] = str.split('-');
  return `${parseInt(m)}/${parseInt(d)}`;
}

// ── ツールカード HTML ──
function renderToolCard(item, type) {
  const isFC    = type === 'fc';
  const badge   = isFC
    ? (item.count > 0 ? `<strong>${item.count}</strong> cards` : 'flashcards')
    : (item.units > 0 ? `<strong>${item.units}</strong> units` : 'notes');
  const tags    = (item.tags || []).map(t =>
    `<span class="tool-card__tag">${t}</span>`
  ).join('');
  const updated = item.updated ? `<span class="tool-card__updated">${fmtDate(item.updated)}</span>` : '';
  const color   = item.color || '#2d6a4f';
  const bgAlpha = hexToAlpha(color, 0.09);

  return `
    <a class="tool-card" href="${item.url}"
       style="--card-color:${color};">
      <div class="tool-card__bar"></div>
      <div class="tool-card__body">
        <div class="tool-card__meta">
          <span class="tool-card__subject"
                style="background:${bgAlpha}">
            ${item.subject}
          </span>
          ${updated}
        </div>
        <p class="tool-card__title">${item.title}</p>
        ${tags ? `<div class="tool-card__tags">${tags}</div>` : ''}
      </div>
      <div class="tool-card__footer">
        <span class="tool-card__badge">${badge}</span>
        <span class="tool-card__arrow">→</span>
      </div>
    </a>
  `;
}

// ── 空状態 ──
function emptyState(msg) {
  return `<div class="empty-state">
    <div class="empty-state__icon">📭</div>
    <p>${msg}</p>
  </div>`;
}

// ── 追加カード（ヒント）──
function addCard(hint) {
  return `<div class="add-card">
    <span class="add-card__icon">＋</span>
    <span>${hint}</span>
  </div>`;
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
(function init() {
  // Flashcards
  const fcGrid  = document.getElementById('fcGrid');
  const fcCount = document.getElementById('fcCount');
  const fcList  = typeof FLASHCARDS !== 'undefined' ? FLASHCARDS : [];

  if (!fcList.length) {
    fcGrid.innerHTML = emptyState('フラッシュカードがまだありません');
  } else {
    fcGrid.innerHTML =
      fcList.map(item => renderToolCard(item, 'fc')).join('') +
      addCard('flashcards-list.js に追記して追加');
  }
  fcCount.textContent = fcList.length ? `(${fcList.length})` : '';

  // Notes
  const notesGrid  = document.getElementById('notesGrid');
  const notesCount = document.getElementById('notesCount');
  const notesList  = typeof NOTES !== 'undefined' ? NOTES : [];

  if (!notesList.length) {
    notesGrid.innerHTML = emptyState('まとめノートがまだありません');
  } else {
    notesGrid.innerHTML =
      notesList.map(item => renderToolCard(item, 'note')).join('') +
      addCard('notes-list.js に追記して追加');
  }
  notesCount.textContent = notesList.length ? `(${notesList.length})` : '';

  // Hero stats & navbar count
  document.getElementById('heroFlashCount').textContent = fcList.length;
  document.getElementById('heroNotesCount').textContent = notesList.length;
  document.getElementById('totalCount').textContent =
    `${fcList.length + notesList.length} tools`;
})();
</script>
</body>
</html>
