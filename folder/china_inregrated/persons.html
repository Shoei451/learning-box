<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人物一覧 — 中国王朝文化史</title>
  <link rel="icon" href="../../../images/chinese-history.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .persons-header {
      padding: 2rem 0 1.5rem;
    }
    .persons-header__title {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--text);
      margin-bottom: .35rem;
    }
    .persons-header__sub {
      font-size: .85rem;
      color: var(--text-sub);
    }

    .search-bar {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      font-size: .9rem;
      color: var(--text);
      margin-bottom: 1rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .search-bar:focus { border-color: var(--accent); }

    .persons-count {
      font-size: .75rem;
      color: var(--text-faint);
      margin-bottom: .75rem;
    }

    .person-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      margin-bottom: .6rem;
      cursor: pointer;
      transition: box-shadow var(--transition), border-color var(--transition);
    }
    .person-card:hover { box-shadow: var(--shadow-sm); border-color: #ccc; }
    .person-card.expanded { border-color: var(--accent); }

    .person-card__header {
      display: flex;
      align-items: baseline;
      gap: .75rem;
      justify-content: space-between;
    }
    .person-card__name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .person-card__meta {
      display: flex;
      gap: .4rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .tag {
      font-size: .68rem;
      font-weight: 600;
      padding: .15rem .5rem;
      border-radius: 99px;
      border: 1px solid var(--border);
      color: var(--text-sub);
      background: var(--bg);
      white-space: nowrap;
    }
    .tag--dynasty {
      background: var(--accent-light);
      border-color: var(--accent-mid);
      color: var(--accent);
    }
    .tag--weak {
      background: #fef9c3;
      border-color: #fde047;
      color: #854d0e;
    }
    .person-card__chevron {
      font-size: .75rem;
      color: var(--text-faint);
      flex-shrink: 0;
      transition: transform var(--transition);
    }
    .person-card.expanded .person-card__chevron { transform: rotate(180deg); }

    .person-card__body {
      display: none;
      margin-top: .85rem;
      padding-top: .85rem;
      border-top: 1px solid var(--border);
    }
    .person-card.expanded .person-card__body { display: block; }

    .person-detail-row {
      display: flex;
      gap: .5rem;
      margin-bottom: .45rem;
      font-size: .82rem;
    }
    .person-detail-row__label {
      min-width: 52px;
      color: var(--text-faint);
      font-weight: 600;
      font-size: .72rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding-top: .05rem;
    }
    .person-detail-row__value { color: var(--text); line-height: 1.55; }

    .works-list { display: flex; flex-wrap: wrap; gap: .35rem; }
    .work-tag {
      padding: .25rem .6rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .78rem;
      color: var(--text);
    }

    .weak-note {
      margin-top: .6rem;
      font-size: .78rem;
      color: #854d0e;
      background: #fef9c3;
      border: 1px solid #fde047;
      border-radius: var(--radius-sm);
      padding: .35rem .65rem;
    }

    .no-results {
      text-align: center;
      color: var(--text-faint);
      font-size: .9rem;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar__left">
      <a href="index.html" class="icon-btn" title="クイズに戻る" style="text-decoration:none">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <div class="topbar__title">人物一覧</div>
    </div>
    <div class="topbar__right">
      <div id="weakBadge" class="score-badge" style="display:none"></div>
    </div>
  </div>

  <div class="page-body">
    <div class="container">
      <div class="persons-header">
        <div class="persons-header__title">人物一覧</div>
        <div class="persons-header__sub">クリックで詳細を表示</div>
      </div>

      <input type="search" class="search-bar" id="searchBar" placeholder="名前・王朝・作品で検索…">

      <div class="filter-bar" id="catFilter">
        <button class="filter-chip active" data-cat="all">すべて</button>
      </div>

      <div class="persons-count" id="countLabel"></div>
      <div id="personList"></div>
    </div>
  </div>

  <script src="quizdata.js"></script>
  <script>
    const WEAK_KEY = 'cultureQuiz_weakItems_v2';
    function loadWeak() {
      try { return JSON.parse(localStorage.getItem(WEAK_KEY) || '{}'); } catch { return {}; }
    }

    let searchQ = '';
    let activeCat = 'all';
    let expandedName = null;

    // Build category filter
    const allCats = [...new Set(quizData.map(p => p.category))].sort();
    const catFilter = document.getElementById('catFilter');
    allCats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-chip';
      btn.dataset.cat = cat;
      btn.textContent = cat;
      btn.addEventListener('click', () => { activeCat = cat; updateFilterUI(); renderList(); });
      catFilter.appendChild(btn);
    });
    catFilter.querySelectorAll('.filter-chip')[0].addEventListener('click', () => { activeCat = 'all'; updateFilterUI(); renderList(); });

    function updateFilterUI() {
      catFilter.querySelectorAll('.filter-chip').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === activeCat);
      });
    }

    document.getElementById('searchBar').addEventListener('input', e => {
      searchQ = e.target.value.toLowerCase();
      renderList();
    });

    function filtered() {
      const weak = loadWeak();
      return quizData.filter(p => {
        const catOk = activeCat === 'all' || p.category === activeCat;
        const q = searchQ;
        const searchOk = !q ||
          p.name.toLowerCase().includes(q) ||
          p.dynasty.toLowerCase().includes(q) ||
          p.category.toLowerCase().includes(q) ||
          p.works.some(w => w.toLowerCase().includes(q));
        return catOk && searchOk;
      }).sort((a, b) => a.era - b.era);
    }

    function renderList() {
      const weak = loadWeak();
      const list = filtered();
      const container = document.getElementById('personList');
      document.getElementById('countLabel').textContent = `${list.length} 人`;

      if (!list.length) {
        container.innerHTML = `<div class="no-results">該当する人物がいません</div>`;
        return;
      }

      container.innerHTML = list.map(p => {
        const missCount = weak[p.name] || 0;
        const isExpanded = expandedName === p.name;
        const eraStr = p.era != null ? (p.era < 0 ? `前${Math.abs(p.era)}年頃` : `${p.era}年頃`) : '';
        const weakTag = missCount > 0 ? `<span class="tag tag--weak">ミス ${missCount}回</span>` : '';

        const bodyHtml = `
          <div class="person-card__body">
            <div class="person-detail-row">
              <div class="person-detail-row__label">王朝</div>
              <div class="person-detail-row__value">${p.dynasty}</div>
            </div>
            <div class="person-detail-row">
              <div class="person-detail-row__label">分類</div>
              <div class="person-detail-row__value">${p.category}</div>
            </div>
            ${eraStr ? `<div class="person-detail-row">
              <div class="person-detail-row__label">年代</div>
              <div class="person-detail-row__value">${eraStr}</div>
            </div>` : ''}
            ${p.works.length > 0 ? `<div class="person-detail-row">
              <div class="person-detail-row__label">作品等</div>
              <div class="person-detail-row__value">
                <div class="works-list">${p.works.map(w => `<span class="work-tag">${w}</span>`).join('')}</div>
              </div>
            </div>` : ''}
            ${missCount > 0 ? `<div class="weak-note">⚠ 苦手問題として ${missCount} 回記録されています</div>` : ''}
          </div>`;

        return `<div class="person-card ${isExpanded ? 'expanded' : ''}"
                     onclick="toggleCard('${p.name.replace(/'/g,"\\'")}')" >
          <div class="person-card__header">
            <div>
              <div class="person-card__name">${p.name}</div>
              <div class="person-card__meta" style="margin-top:.3rem">
                <span class="tag tag--dynasty">${p.dynasty}</span>
                <span class="tag">${p.category}</span>
                ${weakTag}
              </div>
            </div>
            <div class="person-card__chevron">▾</div>
          </div>
          ${bodyHtml}
        </div>`;
      }).join('');

      // Weak badge in topbar
      const totalWeak = Object.values(weak).filter(v => v > 0).length;
      const badge = document.getElementById('weakBadge');
      badge.style.display = totalWeak > 0 ? '' : 'none';
      badge.textContent = `苦手 ${totalWeak}`;
    }

    function toggleCard(name) {
      expandedName = expandedName === name ? null : name;
      renderList();
    }

    renderList();
  </script>
</body>
</html>
